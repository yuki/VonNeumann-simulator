<!DOCTYPE html>
<!-- saved from url=(0033)https://lab.xitrus.es/VonNeumann/ -->
<html>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title></title>
    <script src="./js/main.js"></script>
    <script src="./js/example_programs.js"></script>
    <script src="./js/texts.js"></script>
    <link rel="stylesheet" href="./css/main.css">
</head>

<body>

    <div class="contenedor">
        <div class="tablas-horizontal">
            <table id="tabla-instrucciones" class="tabla">
                <thead>
                    <tr>
                        <th id="inst"></th>
                        <th id="dir"></th>
                        <th id="comment"></th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>

            <div id="ejercicios">
                <table id="tabla-ejercicios" class="tabla">
                    <thead>
                        <tr>
                            <th id="exercise"></th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
                <button id="btnEjecutar" class="btn"></button>
                <button id="btnUpload" class="btn"></button>
            </div>

            <div class="bloque-svg">
                <h1 id="title"></h1>
                <embed src="vonneumann.svg" type="image/svg+xml" id='svg' class="hidden"/>
            </div>
        </div>
    </div>
    <div id="info" class="closed">
        <div class="info_cont"><code id="info_cont"></code></div>
        <div class="info_open">
            <button id="info_b_a" class="btn"></button>
            <button id="info_b_r" class="btn"></button>
            <button id="info_b_c" class="btn"></button>
            <button id="info_b_n" class="btn"></button>
            <div class="language-select">
                <select id="languageSelect" onchange="changeLanguage(this.value)">
                    <option value="es">Castellano</option>
                    <option value="eu">Euskera</option>
                    <option value="en">Inglés</option>
                </select>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener("load", programSelector, false);
    </script>

</body>

</html>
